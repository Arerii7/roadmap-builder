<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road-Map Builder</title>
  <meta name="description" content="Веб-приложение для создания и управления roadmap-проектами">
  <meta name="theme-color" content="#1a1a2e">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; connect-src 'self'; base-uri 'self'; form-action 'self';">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
  
</head>
<body>
  <div id="app">
    <header class="toolbar">
      <div class="toolbar-left">
        <div class="project-selector">
          <button class="project-dropdown-btn" id="projectDropdownBtn">
            <span id="currentProjectName">Мой проект</span>
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
          </button>
          <div class="project-dropdown" id="projectDropdown">
            <div class="project-list" id="projectList"></div>
            <div class="project-actions">
              <button class="btn btn-small" id="newProjectBtn">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                <span data-i18n="newProject">Новый проект</span>
              </button>
            </div>
          </div>
        </div>
        <div class="view-switcher">
          <button class="view-btn active" data-view="tree" title="Древовидный вид">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18l6.9 3.45L12 11.09 5.1 7.63 12 4.18zM4 8.82l7 3.5v7.36l-7-3.5V8.82zm9 10.86v-7.36l7-3.5v7.36l-7 3.5z"/></svg>
          </button>
          <button class="view-btn" data-view="timeline" title="Временная шкала">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 12h2v5H7zm4-3h2v8h-2zm4-3h2v11h-2z"/></svg>
          </button>
          <button class="view-btn" data-view="kanban" title="Канбан доска">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 3h6v18H3V3zm12 0h6v18h-6V3zm-6 6h6v12H9V9z"/></svg>
          </button>
          <button class="view-btn" data-view="gantt" title="Диаграмма Ганта">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 5h18v2H3V5zm0 6h12v2H3v-2zm0 6h18v2H3v-2zm0 6h12v2H3v-2z"/></svg>
          </button>
          <button class="view-btn" data-view="calendar" title="Календарь">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10z"/></svg>
          </button>
        </div>
        <div class="zoom-controls">
          <button class="zoom-btn" id="zoomIn" title="Увеличить">+</button>
          <button class="zoom-btn" id="zoomOut" title="Уменьшить">−</button>
          <button class="zoom-btn" id="zoomReset" title="Сбросить">⟲</button>
        </div>
      </div>
      <div class="toolbar-right">
        <div class="toolbar-controls">
          <button class="btn btn-icon" id="undoBtn" title="Undo (Ctrl+Z)">↶</button>
          <button class="btn btn-icon" id="redoBtn" title="Redo (Ctrl+Y)">↷</button>
        </div>
        <div class="toolbar-divider"></div>
        <button class="btn" id="addNodeBtn" title="Add Task">
          <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
          <span data-i18n="add">Добавить</span>
        </button>
        <button class="btn btn-secondary" id="exportJsonBtn" title="Export JSON">JSON</button>
        <button class="btn btn-secondary" id="exportPngBtn" title="Export PNG">PNG</button>
        <button class="btn btn-secondary" id="importJsonBtn" title="Import JSON">Импорт</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
        <div class="toolbar-divider"></div>
        <div class="theme-toggle">
          <button class="btn btn-icon theme-btn" id="themeToggle" title="Toggle theme">◐</button>
        </div>
        <div class="lang-select">
          <select id="langSelect">
            <option value="ru">RU</option>
            <option value="en">EN</option>
          </select>
        </div>
        <button class="btn btn-icon" id="toggleTodoPanel" title="TODO">☰</button>
      </div>
    </header>

    <main class="main-content">
      <aside class="sidebar">
        <div class="sidebar-section">
          <h3 data-i18n="search">Поиск</h3>
          <div class="search-box">
            <input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="Поиск задач...">
          </div>
          <div class="filter-row">
            <select id="filterStatus">
              <option value="" data-i18n="allStatuses">Все статусы</option>
              <option value="idea" data-i18n="idea">Идея</option>
              <option value="in_progress" data-i18n="inProgress">В работе</option>
              <option value="done" data-i18n="done">Готово</option>
            </select>
            <select id="filterPriority">
              <option value="" data-i18n="allPriorities">Все приоритеты</option>
              <option value="low" data-i18n="low">Низкий</option>
              <option value="medium" data-i18n="medium">Средний</option>
              <option value="high" data-i18n="high">Высокий</option>
            </select>
          </div>
        </div>
        <div class="sidebar-section">
          <h3>Задачи</h3>
          <div id="nodeList" class="node-list"></div>
        </div>
        <div class="sidebar-section">
          <h3>Свойства</h3>
          <div id="nodeProperties" class="properties-panel">
            <p class="empty-state" data-i18n="selectTask">Выберите задачу</p>
          </div>
        </div>
      </aside>

      <div class="canvas-container" id="canvasContainer">
        <div id="canvas" class="canvas">
          <div id="nodesContainer" class="nodes-container"></div>
          <svg id="connectionsLayer" class="connections-layer"></svg>
        </div>
      </div>

      <aside class="sidebar-right" id="todoPanel">
        <div class="sidebar-section">
          <div class="todo-header">
            <h3 data-i18n="todoTitle">TODO</h3>
            <button class="btn btn-small" id="addTodoBtn">+</button>
          </div>
          <div class="todo-input-row" id="todoInputRow" style="display:none">
            <input type="text" id="todoInput" data-i18n-placeholder="add" placeholder="Новая задача...">
          </div>
        </div>
        <div class="sidebar-section">
          <div id="todoList" class="todo-list"></div>
        </div>
      </aside>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitle" data-i18n="newTask">Новая задача</h2>
      <form id="nodeForm">
        <input type="hidden" id="nodeId">
        <div class="form-group">
          <label for="nodeTitle" data-i18n="title">Название</label>
          <input type="text" id="nodeTitle" required>
        </div>
        <div class="form-group">
          <label for="nodeDescription" data-i18n="description">Описание</label>
          <textarea id="nodeDescription" rows="3"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="nodeStatus" data-i18n="status">Статус</label>
            <select id="nodeStatus">
              <option value="idea" data-i18n="idea">Идея</option>
              <option value="in_progress" data-i18n="inProgress">В работе</option>
              <option value="done" data-i18n="done">Готово</option>
            </select>
          </div>
          <div class="form-group">
            <label for="nodePriority" data-i18n="priority">Приоритет</label>
            <select id="nodePriority">
              <option value="low" data-i18n="low">Низкий</option>
              <option value="medium" data-i18n="medium">Средний</option>
              <option value="high" data-i18n="high">Высокий</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="nodeStartDate" data-i18n="startDate">Дата начала</label>
            <input type="date" id="nodeStartDate">
          </div>
          <div class="form-group">
            <label for="nodeEndDate" data-i18n="endDate">Дата окончания</label>
            <input type="date" id="nodeEndDate">
          </div>
        </div>
        <div class="form-group">
          <label for="nodeProgress" data-i18n="progress">Прогресс (%)</label>
          <input type="range" id="nodeProgress" min="0" max="100" value="0">
          <span id="progressValue">0%</span>
        </div>
        <div class="form-group">
          <label for="nodeTags" data-i18n="tags">Теги</label>
          <input type="text" id="nodeTags" placeholder="тег1, тег2, тег3">
        </div>
        <div class="form-group">
          <label for="nodeParent" data-i18n="parent">Родительская задача</label>
          <select id="nodeParent">
            <option value="" data-i18n="noParent">Нет</option>
          </select>
        </div>
        <div class="form-group">
          <label data-i18n="subtasks">Подзадачи</label>
          <div id="subtasksList" class="subtasks-list"></div>
          <button type="button" class="btn btn-small btn-secondary" id="addSubtaskBtn" data-i18n="addSubtask">+ Добавить подзадачу</button>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelNodeBtn" data-i18n="cancel">Отмена</button>
          <button type="submit" class="btn" data-i18n="save">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="contextMenu" class="context-menu hidden">
    <div class="context-menu-item" data-action="edit">Изменить</div>
    <div class="context-menu-item" data-action="duplicate">Дублировать</div>
    <div class="context-menu-item" data-action="addChild">Добавить подзадачу</div>
    <div class="context-menu-divider"></div>
    <div class="context-menu-item context-menu-item-danger" data-action="delete">Удалить</div>
  </div>

  
  <script src="app.js"></script>
</body>
</html>
