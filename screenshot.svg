<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Toolbar -->
  <rect x="0" y="0" width="800" height="50" fill="#16213e"/>
  <text x="20" y="32" fill="#6366f1" font-family="Inter, sans-serif" font-size="18" font-weight="700">Road-Map Builder</text>
  <!-- View buttons -->
  <rect x="180" y="12" width="220" height="26" rx="6" fill="#0f0f23"/>
  <rect x="185" y="15" width="40" height="20" rx="4" fill="url(#accent)"/>
  <text x="195" y="29" fill="white" font-size="10">Tree</text>
  <rect x="230" y="18" width="50" height="14" rx="3" fill="#2a2a4a"/>
  <rect x="285" y="18" width="50" height="14" rx="3" fill="#2a2a4a"/>
  <rect x="340" y="18" width="50" height="14" rx="3" fill="#2a2a4a"/>
  <!-- Sidebar -->
  <rect x="0" y="50" width="200" height="400" fill="#16213e"/>
  <text x="20" y="85" fill="#a0a0a0" font-size="11" font-family="Inter, sans-serif">SEARCH</text>
  <rect x="20" y="95" width="160" height="32" rx="8" fill="#0f0f23"/>
  <!-- Node cards -->
  <rect x="250" y="100" width="180" height="100" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="2"/>
  <text x="270" y="130" fill="#e8e8e8" font-family="Inter, sans-serif" font-size="14" font-weight="600">Frontend Development</text>
  <text x="270" y="150" fill="#a0a0a0" font-size="12">Setup React project</text>
  <rect x="270" y="165" width="50" height="18" rx="4" fill="rgba(99,102,241,0.3)"/>
  <text x="278" y="177" fill="#6366f1" font-size="10">In Progress</text>
  <rect x="270" y="180" width="140" height="4" rx="2" fill="#0f0f23"/>
  <rect x="270" y="180" width="70" height="4" rx="2" fill="url(#accent)"/>
  <!-- Second node -->
  <rect x="480" y="150" width="180" height="90" rx="12" fill="#1e1e3a" stroke="#2a2a4a" stroke-width="2"/>
  <text x="500" y="175" fill="#e8e8e8" font-family="Inter, sans-serif" font-size="14" font-weight="600">Backend API</text>
  <rect x="500" y="190" width="40" height="16" rx="3" fill="rgba(245,158,11,0.3)"/>
  <text x="506" y="201" fill="#f59e0b" font-size="10">Idea</text>
  <!-- Connection line -->
  <path d="M430 150 Q455 150 455 170 Q455 190 480 190" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Kanban hint -->
  <rect x="550" y="320" width="200" height="80" rx="10" fill="#16213e" stroke="#2a2a4a"/>
  <text x="570" y="350" fill="#a0a0a0" font-size="11">+ 3 more views</text>
  <text x="570" y="370" fill="#6366f1" font-size="12">Timeline • Kanban • Gantt • Calendar</text>
</svg>